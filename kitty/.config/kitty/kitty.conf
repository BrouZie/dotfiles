# THEMING COLORS GENERATED BY SOKRATOS
include ~/.config/sokratOS/current/theme/colors.conf
# FiraCode Nerd Font Mono
# font_family JetbrainsMono Nerd Font
# CaskaydiaCove Nerd Font - no ligatures
# font_family CaskaydiaCove Nerd Font
font_family Iosevka Nerd Font
font_size 14

disable_ligatures never

shell_integration no-cursor
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

# Dynamic, text-aware cursor
cursor none

# cursor_text_color background
# Text composition (important for ligatures)
text_composition_strategy platform

enable_audio_bell no

# Window configs
remember_window_size no
window_padding_width 16
confirm_os_window_close 0

# Opacity
background_opacity 0.90
# background_opacity 1

# Use icat in terminal (see .bashrc)
allow_remote_control yes

# Performance?
sync_to_monitor no
# input_delay 3
# repaint_delay 8

map f11 toggle_fullscreen
